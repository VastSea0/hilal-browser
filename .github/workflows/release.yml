name: Build and Release

on:
  push:
    tags: ["v*"]

  workflow_dispatch:
    inputs:
      tag:
        required: true

permissions:
  contents: write

env:
  HILAL_FIREFOX_UPSTREAM: "https://github.com/mozilla-firefox/firefox.git"

jobs:
  create-release:
    # 🔒 sadece repo sahibi çalışsın
    if: github.actor == 'GreenKod'

    runs-on: ubuntu-latest

    steps:
      # =========================
      # DETERMINE TAG + DYNAMIC BODY
      # =========================
      - name: Determine tag & release body
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
            TRIGGER="manual workflow_dispatch"
          else
            TAG="${{ github.ref_name }}"
            TRIGGER="tag push"
          fi

          DATE=$(date -u +"%Y-%m-%d %H:%M:%S UTC")

          BODY="## 🚀 Hilal Browser Release

- **Tag:** ${TAG}
- **Trigger:** ${TRIGGER}
- **Date:** ${DATE}
- **Upstream:** ${HILAL_FIREFOX_UPSTREAM}

⚡ Auto-generated by GitHub Actions"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      # =========================
      # CREATE RELEASE
      # =========================
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: "Hilal Browser ${{ steps.vars.outputs.tag }}"
          body: ${{ steps.vars.outputs.body }}
          generate_release_notes: true
          draft: false
          prerelease: false