name: Build and Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to build (e.g. v1.0.0)"
        required: true

# Concurrency limits ensure that if multiple builds are triggered, older ones are cancelled automatically.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

env:
  # Upstream Firefox version to fetch. Set to "latest" or a specific version (e.g., "128.0")
  FIREFOX_VER: "latest" 

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.vars.outputs.tag }}
    steps:
      - name: Determine SCM Tag
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Initialize GitHub Release
        id: create-release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: "Hilal Browser ${{ steps.vars.outputs.tag }}"
          generate_release_notes: true
          draft: false
          prerelease: false

  # =================================================================
  # SINGLE JOB TO PACK ALL PLATFORMS VIA UBUNTU RUNNER (FAST & LIGHT)
  # =================================================================
  build-all-platforms:
    needs: create-release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install System Build Toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y genisoimage p7zip-full wget curl

      # -------------------------------------------------------------
      # 1. LINUX TARBALL BINARY PACKAGING
      # -------------------------------------------------------------
      - name: Assemble Linux Target Package
        run: |
          mkdir -p build/linux
          # Fetch pre-built official Linux archive from Mozilla upstream
          wget -O firefox-linux.tar.bz2 "https://download.mozilla.org/?product=firefox-${{ env.FIREFOX_VER }}-ssl&os=linux64&lang=tr"
          tar -xjf firefox-linux.tar.bz2 -C build/linux
          
          # Inject Hilal Browser specific branding assets and preference blueprints
          cp -r branding/* build/linux/firefox/browser/chrome/icons/default/ 2>/dev/null || true
          cp -r prefs/* build/linux/firefox/browser/defaults/preferences/ 2>/dev/null || true
          
          # Execute local compilation patches if scripts exist
          if [ -d "patches" ] && [ -f "scripts/apply.sh" ]; then
            chmod +x scripts/apply.sh
            ./scripts/apply.sh build/linux/firefox/ || true
          fi
          
          # Archive finalized build environment
          cd build/linux
          tar -czf ../../hilal-browser-linux64.tar.gz firefox/
          cd ../../

      # -------------------------------------------------------------
      # 2. WINDOWS PORTABLE ZIP PACKAGING
      # -------------------------------------------------------------
      - name: Assemble Windows Target Package
        run: |
          mkdir -p build/windows
          # Fetch official Windows 64-bit binary structure
          wget -O firefox-win64.zip "https://download.mozilla.org/?product=firefox-${{ env.FIREFOX_VER }}-ssl&os=win64&lang=tr"
          7z x firefox-win64.zip -obuild/windows
          
          # Inject configuration matrices into Windows core trees
          cp -r branding/* build/windows/core/browser/chrome/icons/default/ 2>/dev/null || true
          cp -r prefs/* build/windows/core/browser/defaults/preferences/ 2>/dev/null || true
          
          # Compress portable execution environment
          cd build/windows
          7z a -tzip ../../hilal-browser-win64.zip core/
          cd ../../

      # -------------------------------------------------------------
      # 3. macOS DMG MOUNT IMAGING ON LINUX RUNNER
      # -------------------------------------------------------------
      - name: Assemble macOS DMG Target Package
        run: |
          mkdir -p build/mac/HilalBrowser.app
          # Fetch official macOS bundle container package
          wget -O firefox-mac.dmg "https://download.mozilla.org/?product=firefox-${{ env.FIREFOX_VER }}-ssl&os=osx&lang=tr"
          
          # Extract the App structural bundle via 7z natively on Linux host
          7z x firefox-mac.dmg -obuild/mac_extracted
          cp -r build/mac_extracted/Firefox.app/* build/mac/HilalBrowser.app/
          
          # Inject corporate identification files and customized configuration layers
          cp -r branding/* build/mac/HilalBrowser.app/Contents/Resources/ 2>/dev/null || true
          cp -r prefs/* build/mac/HilalBrowser.app/Contents/Resources/browser/defaults/preferences/ 2>/dev/null || true
          
          # Generate standard Apple HFS+ compliant deployment DMG container
          mkdir -p build/dmg_zone
          mv build/mac/HilalBrowser.app build/dmg_zone/
          genisoimage -V "Hilal Browser" -D -R -apple -no-pad -o hilal-browser-macos.dmg build/dmg_zone/

      # -------------------------------------------------------------
      # 4. PUBLISH ALL GENERATED ARTIFACTS TO THE CURRENT RELEASE
      # -------------------------------------------------------------
      - name: Upload Distribution Artifacts to Release Target
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: |
            hilal-browser-linux64.tar.gz
            hilal-browser-win64.zip
            hilal-browser-macos.dmg

      # -------------------------------------------------------------
      # 5. WORKSPACE PURGE & RUNNER HARD DRIVE MAINTENANCE
      # -------------------------------------------------------------
      - name: Execute Workspace Sanitization
        if: always()
        run: |
          rm -rf build/
          rm -f firefox-linux.tar.bz2 firefox-win64.zip firefox-mac.dmg
          rm -f hilal-browser-linux64.tar.gz hilal-browser-win64.zip hilal-browser-macos.dmg