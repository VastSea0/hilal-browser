name: Build and Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: "Git tag to build (e.g. v1.0.0)"
        required: true

permissions:
  contents: write

env:
  HILAL_FIREFOX_UPSTREAM: "https://github.com/mozilla-firefox/firefox.git"

jobs:
  create-release:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.vars.outputs.tag }}

    steps:
      - name: Determine tag
        id: vars
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"

      - name: Create GitHub release (DRAFT)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.vars.outputs.tag }}
          name: "Hilal Browser ${{ steps.vars.outputs.tag }}"
          generate_release_notes: true
          draft: true
          prerelease: ${{ contains(steps.vars.outputs.tag, 'alpha') || contains(steps.vars.outputs.tag, 'beta') || contains(steps.vars.outputs.tag, 'rc') }}

  sign-macos:
    needs: create-release
    runs-on: macos-latest
    timeout-minutes: 120
    if: >
      ${{
        secrets.CODESIGN_IDENTITY != '' &&
        secrets.APPLE_ID != '' &&
        secrets.APPLE_APP_SPECIFIC_PASSWORD != '' &&
        secrets.APPLE_TEAM_ID != ''
      }}

    steps:
      - name: Checkout Hilal Browser
        uses: actions/checkout@v4

      - name: Cache Firefox source checkout
        uses: actions/cache@v4
        with:
          path: firefox
          key: firefox-${{ hashFiles('FIREFOX_COMMIT') }}
          restore-keys: |
            firefox-

      - name: Set up Firefox source tree
        run: scripts/setup-firefox.sh

      - name: Apply Hilal patches
        run: scripts/apply.sh --force --no-symlinks

      - name: Import signing certificate
        if: ${{ secrets.MACOS_CERTIFICATE != '' }}
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
        run: |
          CERT_PATH="$(mktemp).p12"
          echo "$MACOS_CERTIFICATE" | base64 --decode > "$CERT_PATH"
          security create-keychain -p "" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "" build.keychain
          security import "$CERT_PATH" -k build.keychain -P "$MACOS_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-keychain-settings -lut 3600 build.keychain
          security set-key-partition-list -S apple-tool:,apple: -k "" build.keychain
          rm -f "$CERT_PATH"

      - name: Build and package Hilal Browser
        run: |
          export CODESIGN_IDENTITY="${{ secrets.CODESIGN_IDENTITY }}"
          scripts/build-macos.sh package --no-symlinks

      - name: Sign and notarize
        env:
          CODESIGN_IDENTITY: ${{ secrets.CODESIGN_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: scripts/sign-macos.sh --notarize

      - name: Create DMG
        run: |
          APP_BUNDLE="$(find firefox/obj-*/dist -name '*.app' -type d -print -quit)"
          DMG_NAME="Hilal-Browser-${{ needs.create-release.outputs.tag }}-macOS.dmg"
          mkdir -p dist
          hdiutil create -volname "Hilal Browser" -srcfolder "$APP_BUNDLE" -ov -format UDZO "dist/$DMG_NAME"
          echo "dmg_path=dist/$DMG_NAME" >> "$GITHUB_ENV"

      - name: Restore Signing NSS Database
        if: ${{ secrets.HILAL_SIGNING_DB_BASE64 != '' }}
        run: |
          echo "${{ secrets.HILAL_SIGNING_DB_BASE64 }}" | base64 -d > signing-db.tar.gz
          mkdir -p /tmp/signing-db
          tar -xzf signing-db.tar.gz -C /tmp/signing-db

      - name: Create Signed Update MAR
        env:
          HILAL_SIGNMAR_NSS_DIR: /tmp/signing-db
          HILAL_SIGNMAR_CERT: mar_sig
        run: |
          if [ -d "/tmp/signing-db" ]; then
            scripts/make-full-update.sh "${{ needs.create-release.outputs.tag }}" dist/hilal-macos-arm64.complete.mar
          else
            scripts/make-full-update.sh --allow-unsigned "${{ needs.create-release.outputs.tag }}" dist/hilal-macos-arm64.complete.mar
          fi

      - name: Generate Update Manifest
        run: |
          TAG="${{ needs.create-release.outputs.tag }}"
          APP_VER=$(cat firefox/browser/config/version.txt)

          node scripts/generate-update-manifest.mjs \
            --version "$TAG" \
            --app-version "$APP_VER" \
            --mar macos-arm64=dist/hilal-macos-arm64.complete.mar \
            --mar-url macos-arm64="https://github.com/vastsea0/hilal-browser/releases/download/$TAG/hilal-macos-arm64.complete.mar" \
            --output dist/hilal-update-manifest.json

      - name: Upload assets to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.create-release.outputs.tag }}
          files: |
            dist/*.dmg
            dist/hilal-macos-arm64.complete.mar
            dist/hilal-update-manifest.json

  publish-release:
    needs: [create-release, sign-macos]
    runs-on: ubuntu-latest

    steps:
      - name: Publish release (finalize)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release edit "${{ needs.create-release.outputs.tag }}" --draft=false
