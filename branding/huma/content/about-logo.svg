   - file, You can obtain one at http://mozilla.org/MPL/2.0/. -->
<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" fill="none">
  <defs>
    <radialGradient id="orb" cx="0.35" cy="0.30" r="0.85">
      <stop offset="0" stop-color="#28447A"/>
      <stop offset="0.55" stop-color="#152A55"/>
      <stop offset="1" stop-color="#0A1733"/>
    </radialGradient>
    <linearGradient id="wing" x1="0.1" y1="0.2" x2="0.95" y2="0.85">
      <stop offset="0" stop-color="#7FE3EF"/>
      <stop offset="0.55" stop-color="#3BB6C7"/>
      <stop offset="1" stop-color="#1B6E80"/>
    </linearGradient>
    <linearGradient id="wingHi" x1="0.2" y1="0.1" x2="0.8" y2="0.6">
      <stop offset="0" stop-color="#BFF1F7" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#5FD4E6" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="gloss" x1="0.3" y1="0" x2="0.5" y2="0.45">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.18"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <clipPath id="orbClip">
      <circle cx="256" cy="256" r="208"/>
    </clipPath>
  </defs>

  <!-- Outer sphere -->
  <circle cx="256" cy="256" r="208" fill="url(#orb)"/>

  <!-- Wing system clipped to the orb so it appears to wrap -->
  <g clip-path="url(#orbClip)">
    <!-- Lower curve / under-wing -->
    <path d="M120 332
             C 170 290, 230 280, 300 296
             C 360 310, 410 296, 446 268
             C 430 320, 384 360, 320 372
             C 256 384, 198 372, 156 356
             Z"
          fill="url(#wing)" opacity="0.95"/>

    <!-- Primary wing sweep -->
    <path d="M150 296
             C 210 232, 286 208, 360 214
             C 432 220, 480 188, 502 156
             C 484 234, 432 286, 360 304
             C 296 320, 232 314, 180 324
             Z"
          fill="url(#wing)"/>

    <!-- Upper feather layer -->
    <path d="M210 246
             C 274 200, 348 184, 412 192
             C 470 200, 506 184, 520 168
             C 504 222, 460 254, 404 264
             C 348 274, 296 270, 254 274
             Z"
          fill="url(#wingHi)"/>

    <!-- Crest tip suggesting the phoenix head -->
    <path d="M298 222
             C 340 196, 384 184, 430 188
             C 416 208, 388 222, 354 230
             C 332 234, 312 230, 298 222 Z"
          fill="#9BE9F2" opacity="0.85"/>

    <!-- Subtle inner shadow at bottom of orb -->
    <ellipse cx="256" cy="402" rx="190" ry="40" fill="#000000" opacity="0.18"/>
  </g>

  <!-- Top glossy highlight -->
  <circle cx="256" cy="256" r="208" fill="url(#gloss)"/>

  <!-- Subtle outline -->
  <circle cx="256" cy="256" r="208" fill="none" stroke="#0A1733" stroke-opacity="0.4" stroke-width="2"/>
</svg>
